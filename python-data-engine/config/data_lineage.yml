  education:
    canonical_source:
      table: matrimony_profiles
      column: highest_education
    wizard:
      route: matrimony.profile.wizard.section
      route_note: "section=education-career"
      blades:
        - resources/views/matrimony/profile/wizard/sections/education_career.blade.php
        - resources/views/components/education-occupation-income-engine.blade.php
      bindings:
