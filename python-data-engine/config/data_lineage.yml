# Data lineage manifest (PHASE 2) — source of truth for wizard vs public profile bindings.
# Paths are relative to the Laravel repository root (parent of python-data-engine/).
# Blade scan is verification-only (regex); manifest drives expectations.

version: 1

fields:
  full_name:
    canonical_source:
      table: matrimony_profiles
      column: full_name
    wizard:
      route: matrimony.profile.wizard.section
      route_note: "GET /matrimony/profile/wizard/basic-info"
      blades:
        - resources/views/matrimony/profile/wizard/sections/basic_info.blade.php
      bindings:
        - profile.full_name
    public_profile:
      route: matrimony.profile.show
      route_note: "GET /profile/{matrimony_profile_id}"
      blades:
        - resources/views/matrimony/profile/show.blade.php
      bindings:
        - profile.full_name

  gender:
    canonical_source:
      table: matrimony_profiles
      column: gender_id
    wizard:
      route: matrimony.profile.wizard.section
      route_note: "section=basic-info"
      blades:
        - resources/views/matrimony/profile/wizard/sections/basic_info.blade.php
      bindings:
        - profile.gender_id
    public_profile:
      route: matrimony.profile.show
      blades:
        - resources/views/matrimony/profile/show.blade.php
      bindings:
        - profile.gender_id

  date_of_birth:
    canonical_source:
      table: matrimony_profiles
