      bindings:
        - profile.date_of_birth

  height_cm:
    canonical_source:
      table: matrimony_profiles
      column: height_cm
    wizard:
      route: matrimony.profile.wizard.section
      route_note: "section=physical — uses x-physical-engine component"
      blades:
        - resources/views/matrimony/profile/wizard/sections/physical.blade.php
        - resources/views/components/physical-engine.blade.php
      bindings:
        - profile.height_cm
    public_profile:
      route: matrimony.profile.show
      blades:
        - resources/views/matrimony/profile/show.blade.php
      bindings:
        - profile.height_cm

  religion:
    canonical_source:
      table: matrimony_profiles
      column: religion_id
    wizard:
      route: matrimony.profile.wizard.section
      route_note: "section=basic-info (religion-caste component)"
      blades:
        - resources/views/matrimony/profile/wizard/sections/basic_info.blade.php
        - resources/views/components/profile/religion-caste-selector.blade.php
      bindings:
        - profile.religion_id
    public_profile:
      route: matrimony.profile.show
      blades:
        - resources/views/matrimony/profile/show.blade.php
      bindings:
        - profile.religion_id

  caste:
    canonical_source:
      table: matrimony_profiles
